name: Release

# Normally called by release-please.yml right after it tags a release (tags
# created with GITHUB_TOKEN don't trigger tag-push workflows, so the call
# must happen in the same run). The tag-push trigger is the manual fallback:
# push a v* tag by hand and this still builds + uploads.
on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag_name:
        description: "Tag to build and release (e.g. v0.2.0)"
        required: true
        type: string

env:
  CARGO_INCREMENTAL: 0
  # The tag being released: the workflow_call input when release-please is
  # driving, the pushed tag otherwise.
  TAG: ${{ inputs.tag_name || github.ref_name }}

# A duplicate run for the same tag must queue behind the first, never cancel
# it — a cancelled build matrix leaves a release with missing assets.
concurrency:
  group: release-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners only — no cross-compilation toolchains to babysit.
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    env:
      # prn-check never touches the database; SQLX_OFFLINE keeps the sqlx
      # macros (which only expand in service-bin code) from wanting a
      # DATABASE_URL at build time.
      SQLX_OFFLINE: "true"
    steps:
      # When release-please calls this workflow the run is on the main-branch
      # push event, so check out the tag explicitly to build the tagged commit.
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Swatinem/rust-cache below handles caching
          cache: false

      - uses: Swatinem/rust-cache@v2

      - name: Build prn-check
        run: cargo build --release --locked --bin prn-check

      - name: Package
        run: tar -czf "prn-check-${{ matrix.target }}.tar.gz" -C target/release prn-check

      - uses: actions/upload-artifact@v4
        with:
          name: prn-check-${{ matrix.target }}
          path: prn-check-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: cd dist && sha256sum prn-check-*.tar.gz > SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        # Re-run safe: if the release already exists (release-please created
        # it, an earlier run made it past this step, or a partial retry),
        # replace its assets instead of failing. The create path only runs for
        # manual tag pushes.
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber \
              dist/prn-check-*.tar.gz dist/SHA256SUMS
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/prn-check-*.tar.gz dist/SHA256SUMS
          fi
